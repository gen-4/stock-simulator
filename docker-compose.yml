services:
  postgres:
    image: postgres:16-alpine
    container_name: stock_simulator_postgres
    environment:
      POSTGRES_DB: stocksimulator
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - stock_network

  redis:
    image: redis:7-alpine
    container_name: stock_simulator_redis
    command: --requirepass ${REDIS_PASSWORD:-changeme}
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-changeme}
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - stock_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stock_simulator_backend
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/stocksimulator
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-changeme}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:-changeme}
      JWT_SECRET: ${JWT_SECRET}
    volumes:
      - backend_logs:/var/log/stock_simulator
    networks:
      - stock_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        PUBLIC_URL: /stock-simulator
        REACT_APP_API_URL: https://cronushub.ddns.net/stock-simulator-api/api
    container_name: stock_simulator_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - stock_network

volumes:
  pgdata:
  redisdata:
  backend_logs:

networks:
  stock_network:
    driver: bridge
